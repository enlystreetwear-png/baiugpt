<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TubeCoach AI</title>
  <link rel="stylesheet" href="/ui/chat.css" />
</head>
<body>
  <main class="shell">
    <section class="topbar" aria-label="BaiuGPT status">
      <div>
        <h1>TubeCoach AI</h1>
        <p>BaiuGPT native mode for YouTube creator planning</p>
      </div>
      <div class="statusGrid" id="statusGrid">
        <span>Checking native mode...</span>
      </div>
    </section>

    <section class="workspace">
      <aside class="sidePanel" aria-label="Chat controls">
        <label>
          TubeCoach niche
          <input id="nicheInput" value="Tech Reviews" />
        </label>
        <label>
          Language
          <input id="langInput" value="Tamil" />
        </label>
        <label>
          API key
          <input id="apiKeyInput" value="baiu-secret-12345" type="password" />
        </label>
        <button id="newChatBtn" type="button">New chat</button>
        <div class="hint">
          TubeCoach mode only. Ask for weekly plans, video ideas, scripts, SEO, thumbnails, Shorts, and channel growth steps.
        </div>
      </aside>

      <section class="chatPanel" aria-label="Chat">
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <textarea id="promptInput" rows="3" placeholder="Ask TubeCoach about your YouTube plan..."></textarea>
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <script src="/ui/chat.js"></script>
</body>
</html>
